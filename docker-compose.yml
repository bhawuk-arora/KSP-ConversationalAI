services:
  # Relational Database with Geospatial PostGIS extension
  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: ksp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ksp_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ksp_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Graph Database for Suspect Relationship Networks
  neo4j:
    image: neo4j:5.12-community
    container_name: ksp-neo4j
    environment:
      NEO4J_AUTH: neo4j/ksp_neo4j_pass
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474" # HTTP UI
      - "7687:7687" # Bolt Protocol
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ksp_neo4j_pass 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 5

  # Vector Database for Semantic Narrative Searching
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ksp-qdrant
    ports:
      - "6333:6333" # HTTP API
      - "6334:6334" # gRPC API
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # In-Memory Cache for Session Memory and Semantic Cache
  redis:
    image: redis:7-alpine
    container_name: ksp-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # KSP FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: ksp-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ksp_db
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ksp_neo4j_pass
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ksp_secret_key_change_in_production
      ALGORITHM: HS256
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # KSP Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ksp-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  neo4jdata:
  qdrantdata:
  redisdata:
