version: '3.8'

services:
  # Relational Database with Geospatial PostGIS extension
  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: ksp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ksp_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ksp_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Graph Database for Suspect Relationship Networks
  neo4j:
    image: neo4j:5.12-community
    container_name: ksp-neo4j
    environment:
      NEO4J_AUTH: neo4j/ksp_neo4j_pass
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474" # HTTP UI
      - "7687:7687" # Bolt Protocol
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ksp_neo4j_pass 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 5

  # Vector Database for Semantic Narrative Searching
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ksp-qdrant
    ports:
      - "6333:6333" # HTTP API
      - "6334:6334" # gRPC API
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # In-Memory Cache for Session Memory and Semantic Cache
  redis:
    image: redis:7-alpine
    container_name: ksp-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  neo4jdata:
  qdrantdata:
  redisdata:
